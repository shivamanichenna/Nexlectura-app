<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10%); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pt-16 pb-[80px] antialiased">
<!-- TopAppBar from JSON -->
<header class="bg-surface/80 dark:bg-dark-surface/80 fixed top-0 w-full backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex justify-between items-center px-margin-mobile h-16 w-full z-50">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
<span class="font-headline-lg text-headline-lg-mobile text-primary dark:text-inverse-primary tracking-tight">Nexlectra</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="flex-1 px-margin-mobile py-lg flex flex-col gap-lg">
<!-- Page Header -->
<div class="flex flex-col gap-1">
<h1 class="font-headline-xl-mobile text-headline-xl-mobile text-on-background">Compose Notification</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Send an alert to classes or individual students.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-md">
<!-- Recipients -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Recipients</label>
<div class="w-full bg-alabaster-base border border-surface-variant rounded-[16px] p-sm flex flex-wrap gap-2 items-center focus-within:border-deep-orange focus-within:ring-1 focus-within:ring-deep-orange transition-all">
<!-- Fake selected chips -->
<div class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full flex items-center gap-1 font-label-md text-label-md">
                        CSE-A
                        <span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-on-primary-fixed">close</span>
</div>
<div class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full flex items-center gap-1 font-label-md text-label-md">
                        Design 101
                        <span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-on-primary-fixed">close</span>
</div>
<input class="flex-1 bg-transparent border-none outline-none focus:ring-0 text-body-md min-w-[150px]" placeholder="Search classes or students..." type="text"/>
</div>
</div>
<!-- Announcement -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Announcement</label>
<textarea class="w-full bg-alabaster-base border border-surface-variant rounded-[16px] p-md text-body-md resize-none focus:border-deep-orange focus:ring-1 focus:ring-deep-orange transition-all" placeholder="Type your message here..." rows="6"></textarea>
</div>
<!-- Urgency -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Urgency Level</label>
<div class="flex gap-2 bg-surface-container-low p-1 rounded-[16px]">
<button class="flex-1 py-2 rounded-[12px] font-label-md text-label-md text-on-surface-variant hover:bg-surface transition-colors" type="button">
                        Low
                    </button>
<button class="flex-1 py-2 rounded-[12px] font-label-md text-label-md bg-white shadow-sm text-deep-orange border border-outline-variant/30 transition-all" type="button">
                        Medium
                    </button>
<button class="flex-1 py-2 rounded-[12px] font-label-md text-label-md text-on-surface-variant hover:bg-surface transition-colors hover:text-error" type="button">
                        Critical
                    </button>
</div>
</div>
<!-- Primary Action -->
<div class="mt-lg">
<button class="w-full bg-deep-orange text-white font-headline-md text-headline-md rounded-full py-4 shadow-md active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                    Send Alert
                </button>
</div>
</form>
</main>
<!-- BottomNavBar from JSON (Inbox Active) -->
<nav class="bg-surface/80 dark:bg-dark-surface/80 fixed bottom-0 w-full rounded-t-xl backdrop-blur-xl border-t border-outline-variant/10 shadow-[0px_-4px_20px_rgba(0,0,0,0.04)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-2 pb-safe px-4 pb-4">
<button class="flex flex-col items-center justify-center text-zinc-muted dark:text-zinc-muted hover:text-primary transition-colors active:scale-110 duration-300 ease-out w-16 gap-1">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-muted dark:text-zinc-muted hover:text-primary transition-colors active:scale-110 duration-300 ease-out w-16 gap-1">
<span class="material-symbols-outlined">school</span>
<span class="font-label-sm text-label-sm">Classes</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-muted dark:text-zinc-muted hover:text-primary transition-colors active:scale-110 duration-300 ease-out w-16 gap-1">
<span class="material-symbols-outlined">group</span>
<span class="font-label-sm text-label-sm">Students</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-inverse-primary animate-bounce-short hover:text-primary transition-colors active:scale-110 duration-300 ease-out w-16 gap-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mail</span>
<span class="font-label-sm text-label-sm">Inbox</span>
</button>
</nav>
</body></html>
